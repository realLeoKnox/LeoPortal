<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台登录 | Leo Portal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="login-container">
    
    <div class="login-card">
      
      <div class="login-header">
        <div class="login-logo">⛵</div>
        <h1 class="login-title">管理后台登录</h1>
        <p class="login-subtitle">请输入您的管理员账户凭证</p>
      </div>

      <!-- Error Message Banner -->
      <div class="error-message-box" id="error-box">
        用户名或密码错误
      </div>

      <form id="login-form" onsubmit="handleLogin(event)">
        
        <div class="login-form-group" style="margin-bottom: 20px;">
          <label class="login-label" for="username">用户名</label>
          <div class="login-input-wrapper">
            <span class="login-input-icon">👤</span>
            <input type="text" id="username" class="login-input" placeholder="请输入管理员账号" required>
          </div>
        </div>

        <div class="login-form-group" style="margin-bottom: 28px;">
          <label class="login-label" for="password">密码</label>
          <div class="login-input-wrapper">
            <span class="login-input-icon">🔒</span>
            <input type="password" id="password" class="login-input" placeholder="请输入密码" required>
          </div>
        </div>

        <button type="submit" class="login-btn" id="login-submit-btn">
          登 录
        </button>

      </form>

      <div class="login-footer">
        <a href="index.html" class="login-back-home">← 返回前台主页</a>
      </div>

    </div>

  </div>

  <script>
    // Access control: Verify auth status with server on startup
    async function checkAuthOnStartup() {
      try {
        const res = await fetch('/api/admin/data');
        if (res.ok) {
          // If already logged in (cookie is valid), redirect to admin console
          location.href = 'admin.html';
        }
      } catch (err) {
        console.error('检查登录态失败:', err);
      }
    }
    
    checkAuthOnStartup();

    async function handleLogin(e) {
      e.preventDefault();
      
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const submitBtn = document.getElementById('login-submit-btn');
      const errorBox = document.getElementById('error-box');

      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      errorBox.style.display = 'none';
      submitBtn.textContent = '登录中...';
      submitBtn.disabled = true;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          // Login successful. The HTTP-Only cookie was written automatically by the browser.
          location.href = 'admin.html';
        } else {
          errorBox.textContent = data.error || '登录失败，请稍后重试';
          errorBox.style.display = 'block';
        }
      } catch (err) {
        console.error('登录请求异常:', err);
        errorBox.textContent = '网络故障，无法连接服务器';
        errorBox.style.display = 'block';
      } finally {
        submitBtn.textContent = '登 录';
        submitBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
